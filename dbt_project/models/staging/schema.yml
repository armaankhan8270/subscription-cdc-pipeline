version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: plan
        tests:
          - accepted_values:
              values: ['free', 'basic', 'premium', 'enterprise']
      - name: status
        tests:
          - accepted_values:
              values: ['active', 'cancelled', 'suspended']

  - name: stg_subscriptions
    columns:
      - name: subscription_id
        tests: [unique, not_null]
      - name: plan_type
        tests:
          - accepted_values:
              values: ['free', 'basic', 'premium', 'enterprise']
      - name: status
        tests:
          - accepted_values:
              values: ['active', 'cancelled', 'expired']

  - name: stg_purchases
    columns:
      - name: purchase_id
        tests: [unique, not_null]
      - name: amount
        tests: [not_null]

  - name: stg_billing_invoices
    columns:
      - name: invoice_id
        tests: [unique, not_null]
      - name: status
        tests:
          - accepted_values:
              values: ['pending', 'paid', 'overdue', 'refunded']

  - name: stg_payment_methods
    columns:
      - name: payment_method_id
        tests: [unique, not_null]
      - name: type
        tests:
          - accepted_values:
              values: ['credit_card', 'paypal', 'bank_transfer']

  - name: stg_usage_events
    columns:
      - name: event_id
        tests: [unique, not_null]

  - name: stg_support_tickets
    columns:
      - name: ticket_id
        tests: [unique, not_null]
      - name: priority
        tests:
          - accepted_values:
              values: ['low', 'medium', 'high', 'critical']
      - name: status
        tests:
          - accepted_values:
              values: ['open', 'in_progress', 'resolved', 'closed']
