version: 2

models:
  - name: dim_customer
    columns:
      - name: customer_sk
        tests: [unique, not_null]
      - name: plan
        tests:
          - accepted_values:
              values: ['free', 'basic', 'premium', 'enterprise']
      - name: customer_id
        tests: [not_null]

  - name: dim_subscription
    columns:
      - name: subscription_sk
        tests: [unique, not_null]
      - name: plan_type
        tests:
          - accepted_values:
              values: ['free', 'basic', 'premium', 'enterprise']
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_id

  - name: dim_support_ticket
    columns:
      - name: ticket_sk
        tests: [unique, not_null]
      - name: priority
        tests:
          - accepted_values:
              values: ['low', 'medium', 'high', 'critical']
      - name: status
        tests:
          - accepted_values:
              values: ['open', 'in_progress', 'resolved', 'closed']
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_id

  - name: fct_purchases
    columns:
      - name: purchase_id
        tests: [unique, not_null]
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_id

  - name: fct_billing_invoices
    columns:
      - name: invoice_id
        tests: [unique, not_null]
      - name: payment_status
        tests:
          - accepted_values:
              values: ['pending', 'paid', 'overdue', 'refunded']
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_id

  - name: fct_usage_events
    columns:
      - name: event_id
        tests: [unique, not_null]
